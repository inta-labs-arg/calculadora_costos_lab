<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
  <title>Calculadora de Costos · LAB INTA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue:        #00548F;
      --blue-dark:   #003F6B;
      --blue-mid:    #C5DCF0;
      --blue-light:  #EBF4FB;
      --green:       #7BB342;
      --green-light: #EEF6E5;
      --orange:      #F39200;
      --orange-light:#FEF3E0;
      --red:         #D94040;
      --red-light:   #FDEAEA;
      --gray-50:     #F8F9FA;
      --gray-100:    #F1F3F5;
      --gray-200:    #E9ECEF;
      --gray-300:    #DEE2E6;
      --gray-400:    #ADB5BD;
      --gray-500:    #868E96;
      --gray-600:    #495057;
      --gray-700:    #343A40;
      --gray-800:    #212529;
      --radius-sm:   6px;
      --radius:      10px;
      --radius-lg:   16px;
      --shadow-sm:   0 1px 3px rgba(0,0,0,.07), 0 1px 2px rgba(0,0,0,.05);
      --shadow:      0 2px 8px rgba(0,0,0,.08), 0 1px 3px rgba(0,0,0,.05);
      --shadow-lg:   0 8px 24px rgba(0,0,0,.10), 0 2px 6px rgba(0,0,0,.06);
    }
    html { font-size: 16px; }
    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--gray-50);
      color: var(--gray-800);
      line-height: 1.5;
      min-height: 100dvh;
    }
    #root { display: flex; flex-direction: column; min-height: 100dvh; }
    input, select, textarea, button {
      font-family: inherit;
      font-size: inherit;
    }
    button { cursor: pointer; border: none; background: none; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
    input[type=number] { -moz-appearance: textfield; }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--gray-300); border-radius: 2px; }

    /* ── TRANSITIONS ── */
    .screen-enter { animation: fadeSlide .22s ease; }
    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="components/state.jsx"></script>
  <script type="text/babel" src="components/Shell.jsx"></script>
  <script type="text/babel" src="components/Dashboard.jsx"></script>
  <script type="text/babel" src="components/Level1.jsx"></script>
  <script type="text/babel" src="components/Levels23.jsx"></script>
  <script type="text/babel" src="components/Summary.jsx"></script>
  <script type="text/babel" src="components/Main.jsx"></script>
</body>
</html>
